<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraderBlock</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='18' font-size='18'>🛡️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          /* Colors - Updated to Modern Palette */
          --color-primary: #3B82F6;
          --color-primary-hover: #2563EB;
          --color-primary-gradient-end: #1D4ED8;
          --color-text-primary: #1E293B;
          --color-text-secondary: #64748B;
          --color-border: #E2E8F0;
          --color-success: #00C896;
          --color-warning: #FF6B35;
          --color-error: #EF4444;
          --color-background-light: #F8FAFC;
          --color-background-error: #FEF2F2;
          --color-bg-white: #FFFFFF;
          --color-bg-dark: #0F1419;
          
          /* Typography */
          --font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --font-size-xs: 0.75rem;
          --font-size-sm: 0.875rem;
          --font-size-base: 1rem;
          --font-size-lg: 1.125rem;
          --font-size-xl: 1.25rem;
          --font-size-2xl: 1.5rem;
          --font-size-3xl: 2rem;
          
          /* Spacing */
          --space-1: 0.25rem;
          --space-2: 0.5rem;
          --space-3: 0.75rem;
          --space-4: 1rem;
          --space-6: 1.5rem;
          --space-8: 2rem;
          
          /* Border Radius */
          --radius-sm: 0.5rem;
          --radius-md: 0.75rem;
          --radius-lg: 1rem;
          --radius-xl: 1.25rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-family);
            background: var(--color-background-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            color: var(--color-text-primary);
        }

        /* Transparent background for FAB mode */
        body.fab-mode {
            background: transparent !important;
            box-shadow: none !important;
        }

        body.fab-mode #root {
            background: transparent !important;
            box-shadow: none !important;
        }
        
        #root {
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 1;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(139, 139, 139, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--color-text-secondary);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-primary);
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
    <script>
        // Check if we're in FAB mode and add class to body
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('fab') === 'true') {
            document.body.classList.add('fab-mode');
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { ThemeProvider, createTheme } from '@mui/material/styles';
        import CssBaseline from '@mui/material/CssBaseline';
        import App from './App.tsx';

        const theme = createTheme({
            typography: {
                fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif',
                h1: {
                    fontSize: '2rem',
                    fontWeight: 700,
                    color: '#1E293B',
                },
                h2: {
                    fontSize: '1.5rem',
                    fontWeight: 600,
                    color: '#1E293B',
                },
                h3: {
                    fontSize: '1.125rem',
                    fontWeight: 600,
                    color: '#1E293B',
                },
                h6: {
                    fontWeight: 600,
                    letterSpacing: '-0.025em',
                    color: '#1E293B',
                },
                body1: {
                    fontWeight: 400,
                    letterSpacing: '-0.01em',
                    color: '#1E293B',
                    lineHeight: 1.5,
                },
                body2: {
                    fontWeight: 400,
                    letterSpacing: '-0.01em',
                    color: '#64748B',
                    fontSize: '0.875rem',
                },
                button: {
                    fontSize: '1rem',
                    fontWeight: 500,
                    textTransform: 'none',
                },
            },
            palette: {
                primary: {
                    main: '#3B82F6',
                    light: '#60A5FA',
                    dark: '#2563EB',
                },
                secondary: {
                    main: '#64748B',
                    light: '#A0AEC0',
                    dark: '#1E293B',
                },
                success: {
                    main: '#00C896',
                    light: '#4dd4aa',
                    dark: '#00a176',
                },
                warning: {
                    main: '#FF6B35',
                    light: '#ff8a61',
                    dark: '#e55029',
                },
                error: {
                    main: '#EF4444',
                    light: '#FCA5A5',
                    dark: '#DC2626',
                },
                background: {
                    default: '#F8FAFC',
                    paper: '#FFFFFF',
                },
                text: {
                    primary: '#1E293B',
                    secondary: '#64748B',
                },
            },
            shape: {
                borderRadius: 12,
            },
            components: {
                MuiCard: {
                    styleOverrides: {
                        root: {
                            backgroundColor: '#FFFFFF',
                            borderRadius: 20,
                            boxShadow: '0 4px 20px rgba(30, 41, 59, 0.10)',
                            border: 'none',
                        },
                    },
                },
                MuiButton: {
                    styleOverrides: {
                        contained: {
                            borderRadius: '12px',
                            padding: '12px 24px',
                            fontWeight: 500,
                            boxShadow: '0 2px 8px rgba(59, 130, 246, 0.15)',
                            textTransform: 'none',
                            backgroundColor: '#3B82F6',
                            color: '#FFFFFF',
                            transition: 'all 0.2s ease',
                            '&:hover': {
                                backgroundColor: '#2563EB',
                                transform: 'translateY(-1px)',
                                boxShadow: '0 4px 12px rgba(59, 130, 246, 0.20)',
                            },
                        },
                        outlined: {
                            borderRadius: '12px',
                            padding: '12px 24px',
                            fontWeight: 500,
                            border: '2px solid #E2E8F0',
                            textTransform: 'none',
                            color: '#1E293B',
                            backgroundColor: '#FFFFFF',
                            transition: 'all 0.2s ease',
                            '&:hover': {
                                border: '2px solid #3B82F6',
                                backgroundColor: 'rgba(59, 130, 246, 0.05)',
                            },
                        },
                    },
                },
                MuiTextField: {
                    styleOverrides: {
                        root: {
                            '& .MuiOutlinedInput-root': {
                                backgroundColor: '#FFFFFF',
                                borderRadius: '12px',
                                border: '2px solid #E2E8F0',
                                fontSize: '14px',
                                padding: '12px 16px',
                                transition: 'all 0.2s ease',
                                '&:hover .MuiOutlinedInput-notchedOutline': {
                                    borderColor: '#3B82F6',
                                },
                                '&.Mui-focused': {
                                    '& .MuiOutlinedInput-notchedOutline': {
                                        borderColor: '#3B82F6',
                                        boxShadow: '0 0 0 3px rgba(59, 130, 246, 0.1)',
                                    },
                                },
                                '& .MuiOutlinedInput-notchedOutline': {
                                    border: 'none',
                                },
                            },
                        },
                    },
                },
                MuiTab: {
                    styleOverrides: {
                        root: {
                            fontWeight: 500,
                            textTransform: 'none',
                            letterSpacing: '-0.01em',
                            fontSize: '1rem',
                            color: '#64748B',
                            '&.Mui-selected': {
                                color: '#1E293B',
                                fontWeight: 600,
                            },
                        },
                    },
                },
                MuiAlert: {
                    styleOverrides: {
                        standardWarning: {
                            backgroundColor: '#FFF3CD',
                            borderLeft: '4px solid #FF6B35',
                            borderRadius: '12px',
                            padding: '16px',
                        },
                        standardError: {
                            backgroundColor: '#FEF2F2',
                            borderLeft: '4px solid #EF4444',
                            borderRadius: '12px',
                            padding: '16px',
                        },
                        standardInfo: {
                            backgroundColor: '#F8FAFC',
                            borderLeft: '4px solid #3B82F6',
                            borderRadius: '12px',
                            padding: '16px',
                        },
                        standardSuccess: {
                            backgroundColor: '#F0FDF4',
                            borderLeft: '4px solid #00C896',
                            borderRadius: '12px',
                            padding: '16px',
                        },
                    },
                },
            },
        });

        const container = document.getElementById('root');
        if (container) {
            const root = createRoot(container);
            root.render(
                React.createElement(ThemeProvider, { theme },
                    React.createElement(CssBaseline),
                    React.createElement(App)
                )
            );
        }
    </script>
</body>
</html>
